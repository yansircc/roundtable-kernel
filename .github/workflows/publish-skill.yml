name: Publish RTK Skill

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish into agent-skills
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish-agent-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Check out roundtable-kernel
        uses: actions/checkout@v4

      - name: Resolve publish version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${INPUT_VERSION:-$REF_NAME}"
          version="${version#v}"
          if [[ -z "$version" ]]; then
            echo "publish version resolved empty" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Check out agent-skills
        uses: actions/checkout@v4
        with:
          repository: yansircc/agent-skills
          token: ${{ secrets.AGENT_SKILLS_PUSH_TOKEN }}
          ref: main
          path: agent-skills

      - name: Sync rtk plugin into agent-skills
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/sync-agent-skills-plugin.sh "$GITHUB_WORKSPACE/agent-skills"

      - name: Verify bundled launcher
        run: |
          set -euo pipefail
          "$GITHUB_WORKSPACE/agent-skills/plugins/rtk/skills/rtk/scripts/rtk" --version
          "$GITHUB_WORKSPACE/agent-skills/plugins/rtk/skills/rtk/scripts/rtk" help stop

      - name: Commit and push agent-skills
        working-directory: agent-skills
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json plugins/rtk
          if git diff --cached --quiet; then
            echo "agent-skills already up to date"
            exit 0
          fi
          git commit -m "Publish rtk skill ${VERSION} from ${SOURCE_SHA}"
          git push origin HEAD:main
